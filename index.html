<!DOCTYPE html>
<html lang="ko">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI 비주얼 라이브러리</title>
<link rel="icon" href="https://gi.esmplus.com/elcanto01/elcanto/ai/ai.png" type="image/png">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#bbcbe8">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="stylesheet" href="./Ai_library.css?v=2026072502">
<script src="./pwa-install.js"></script>

<!-- Firebase (Firestore: 데이터 저장 / Auth: 로그인) -->
<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-auth-compat.js"></script>
<script src="./firebase-config.js"></script>

<!-- Cloudinary (이미지 업로드/호스팅) -->
<script src="./cloudinary-config.js?v=2026071603"></script>
<script src="./Ai_library.js?v=2026072307"></script>

<div class="login-screen" id="loginScreen">
    <form class="login-box" id="loginForm" onsubmit="loginUser(event)">
        <h1>AI 비주얼 라이브러리</h1>
        <p>발급 받은 아이디(이메일)와 비밀번호로 로그인 하세요.</p>
        <input type="email" id="loginEmail" placeholder="이메일" required autocomplete="username">
        <input type="password" id="loginPassword" placeholder="비밀번호" required autocomplete="current-password">
        <button type="submit" class="search-btn" id="loginSubmitBtn">로그인</button>
        <div class="login-error" id="loginError"></div>
    </form>
</div>

<div class="main-wrapper" id="mainWrapper" style="display:none;">

    <div class="container">
        <div class="header">
            <h1>AI 비주얼 라이브러리</h1>
            <div style="display:flex; align-items:center; gap:8px;">
                <button class="register-btn" id="installAppBtn" onclick="handleAppInstallClick()" style="display:none;">📲 앱 설치</button>
                <button class="register-btn" onclick="openRegisterModal()">+ 새 항목 등록</button>
                <button class="logout-btn" onclick="logoutUser()">로그아웃</button>
            </div>
        </div>

        <div class="search-wrap">
            <input id="searchInput" placeholder="검색어를 입력하세요.">
            <button class="search-btn" onclick="applyFilters()">검색</button>
            <button class="reset-btn" onclick="resetFilters()">초기화</button>
        </div>

        <div class="filter-area">
            <select id="brand"><option value="">브랜드</option>
                <option>ELCANTO</option>
                <option>MAZZ</option>
                <option>INTENSE</option>
                <option>DEEPP</option>
            </select>
            <select id="gender"><option value="">성별</option>
                <option>남화</option>
                <option>여화</option>
                <option>기타</option>
            </select>
            <select id="category"><option value="">카테고리</option>
                <option>샌들</option>
                <option>로퍼/드레스</option>
                <option>컴포트화</option>
                <option>스니커즈</option>
                <option>부츠</option>
                <option>힐</option>
                <option>슬리퍼/뮬</option>
                <option>플랫</option>
                <option>기타</option>
            </select>
            <select id="season"><option value="">시즌</option>
                <option>21 WINTER</option>
                <option>22 AUTUMN</option>   
                <option>23 SPRING</option>
                <option>23 SUMMER</option>
                <option>23 AUTUMN</option>   
                <option>24 SPRING</option>
                <option>24 SUMMER</option>
                <option>24 AUTUMN</option>                
                <option>25 WINTER</option>
                <option>26 SPRING</option>
                <option>26 SUMMER</option>
                <option>26 AUTUMN</option>
                <option>26 WINTER</option>
            </select>
            <select id="background"><option value="">장소 컨셉</option>
                <option>야외</option>
                <option>스튜디오</option>
            </select>
            <select id="usage"><option value="">유형</option>
                <option>기획전</option>
                <option>착화컷</option>
                <option>컨셉컷</option>
                <option>배너</option>
                <option>SNS·광고</option>
                <option>상세페이지</option>
                <option>기타</option>
            </select>
            <select id="tool"><option value="">AI 툴</option>
                <option>Gemini</option>
                <option>Google AI Studio</option>
                <option>Chat GPT</option>   
                <option>Grok</option>                
            </select>
            <select id="type"><option value="">타입</option>
                <option>이미지</option>
                <option>영상</option>
            </select>
            <select id="team"><option value="">생성 부서</option>
                <option>WEB팀</option>
                <option>온라인팀</option>
                <option>오프라인팀</option>
            </select>
        </div>

        <div class="result-count" id="resultCount">총 0건의 결과</div>
        <div class="gallery" id="gallery"></div>
    </div>

    <div class="detail-panel" id="detailPanel">
        <div class="empty-panel"></div>
    </div>

    <div class="modal-overlay" id="registerModal">
        <div class="modal-box">
            <div class="modal-header">
                <h2 id="registerModalTitle">새 항목 등록</h2>
                <button type="button" class="modal-close" onclick="closeRegisterModal()">&times;</button>
            </div>

            <form id="registerForm" onsubmit="submitRegisterForm(event)">
                <div class="form-grid">
                    <div class="form-field full">
                        <label>제목 *</label>
                        <input type="text" name="title" required placeholder="품번/사용 목적 등">
                    </div>

                    <div class="form-field">
                        <label>타입 *</label>
                        <select name="type" required>
                            <option value="이미지">이미지</option>
                            <option value="영상">영상</option>
                        </select>
                    </div>

                    <div class="form-field">
                        <label>생성 부서 *</label>
                        <select name="team" required>
                            <option value="WEB팀">WEB팀</option>
                            <option value="온라인팀">온라인팀</option>
                            <option value="오프라인팀">오프라인팀</option>
                        </select>
                    </div>

                    <div class="form-field">
                        <label>브랜드 *</label>
                        <select name="brand" required>
                            <option value="ELCANTO">ELCANTO</option>
                            <option value="MAZZ">MAZZ</option>
                            <option value="INTENSE">INTENSE</option>
                            <option value="DEEPP">DEEPP</option>
                        </select>
                    </div>

                    <div class="form-field">
                        <label>성별 *</label>
                        <select name="gender" required>
                            <option value="남화">남화</option>
                            <option value="여화">여화</option>
                            <option value="기타">기타</option>
                        </select>
                    </div>

                    <div class="form-field">
                        <label>카테고리 *</label>
                        <select name="category" required>
                            <option>샌들</option>
                            <option>로퍼/드레스</option>
                            <option>컴포트화</option>
                            <option>스니커즈</option>
                            <option>부츠</option>
                            <option>힐</option>
                            <option>슬리퍼/뮬</option>
                            <option>플랫</option>
                            <option>기타</option>
                        </select>
                    </div>

                    <div class="form-field">
                        <label>시즌 *</label>
                        <select name="season" required>
                            <option>21 WINTER</option>
                            <option>22 AUTUMN</option>
                            <option>22 WINTER</option>
                            <option>23 SPRING</option>
                            <option>23 SUMMER</option>
                            <option>23 AUTUMN</option>
                            <option>23 WINTER</option>
                            <option>24 SPRING</option>
                            <option>24 SUMMER</option>
                            <option>24 AUTUMN</option>
                            <option>24 WINTER</option>
                            <option>25 SPRING</option> 
                            <option>25 SUMMER</option>
                            <option>25 AUTUMN</option>
                            <option>25 WINTER</option>
                            <option>26 SPRING</option>
                            <option selected>26 SUMMER</option>
                            <option>26 AUTUMN</option>
                            <option>26 WINTER</option>
                        </select>
                    </div>

                    <div class="form-field">
                        <label>장소 컨셉 *</label>
                        <select name="background" required>
                            <option value="야외">야외</option>
                            <option value="스튜디오">스튜디오</option>
                        </select>
                    </div>

                    <div class="form-field">
                        <label>유형 *</label>
                        <select name="usage" required>
                            <option>기획전</option>
                            <option>착화컷</option>
                            <option>컨셉컷</option>
                            <option>배너</option>
                            <option>SNS·광고</option>
                            <option>상세페이지</option>
                            <option>기타</option>
                        </select>
                    </div>

                    <div class="form-field">
                        <label>AI 툴 *</label>
                        <select name="tool" required>
                            <option>Google AI Studio</option>
                            <option>Gemini</option>
                            <option>Chat GPT</option>
                            <option>Grok</option>
                        </select>
                    </div>

                    <div class="form-field">
                        <label>생성일 *</label>
                        <input type="date" name="created" required>
                    </div>

                    <div class="form-field full">
                        <label>원본 이미지 경로</label>
                        <input type="text" name="link" placeholder="\\172.30.235.50\...">
                    </div>

                    <div class="form-field full">
                        <label>활용 내용</label>
                        <input type="text" name="usedIn" placeholder="예: 기획전 / 이벤트 페이지 등">
                    </div>

                    <div class="form-field full">
                        <label>참고사항</label>
                        <input type="text" name="reaction" placeholder="예: 얼굴 사용 가능 / 착화 확대 위주 사용 등">
                    </div>

                    <div class="form-field full">
                        <label>Prompt</label>
                        <textarea name="prompt" rows="4" placeholder="프롬프트를 입력해 주세요"></textarea>
                    </div>

                    <div class="form-field full">
                        <label id="mainImageLabel">대표 이미지 *</label>
                        <input type="file" id="mainImageInput" name="mainImage" accept="image/*" required>
                        <small id="mainImageHint" style="display:none; color:#888;">비워두면 기존 이미지를 그대로 사용합니다.</small>
                    </div>

                    <div class="form-field full">
                        <label>상세/서브 이미지 (여러 장 선택 가능)</label>
                        <input type="file" name="subImages" accept="image/*" multiple>
                        <small id="subImageHint" style="display:none; color:#888;">비워두면 기존 서브 이미지를 그대로 사용합니다.</small>
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="button" class="reset-btn" onclick="closeRegisterModal()">취소</button>
                    <button type="submit" class="search-btn" id="registerSubmitBtn">등록하기</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('pwa-install-available', () => {
            const btn = document.getElementById('installAppBtn');
            if (btn) btn.style.display = 'inline-flex';
        });
        async function handleAppInstallClick() {
            const result = await window.triggerPwaInstall();
            if (result === 'accepted') {
                document.getElementById('installAppBtn').style.display = 'none';
            }
        }
    </script>

    <div class="modal-overlay" id="confirmModal">
        <div class="confirm-box">
            <p id="confirmMessage">삭제하시겠습니까?</p>
            <div class="confirm-actions">
                <button type="button" class="reset-btn" id="confirmCancelBtn">취소</button>
                <button type="button" class="confirm-danger-btn" id="confirmOkBtn">삭제</button>
            </div>
        </div>
    </div>

</div>

</body>
</html>
